<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工业智能控制仿真平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: white;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #7b2fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #a0a0a0;
            font-size: 1.1rem;
        }
        
        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .nav-btn:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
        }
        
        .nav-btn.active {
            background: rgba(0, 212, 255, 0.3);
            border-color: #00d4ff;
        }
        
        .algorithm-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .algo-btn {
            padding: 10px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            background: transparent;
            color: #a0a0a0;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }
        
        .algo-btn:hover {
            border-color: #00d4ff;
            color: #00d4ff;
        }
        
        .algo-btn.active {
            background: linear-gradient(90deg, #00d4ff, #7b2fff);
            border-color: transparent;
            color: white;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
        }
        
        .card-title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .temp-display {
            text-align: center;
            padding: 30px 0;
        }
        
        .temp-value {
            font-size: 5rem;
            font-weight: bold;
            color: #00d4ff;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }
        
        .temp-unit {
            font-size: 1.5rem;
            color: #a0a0a0;
        }
        
        .target-info {
            margin-top: 15px;
            color: #a0a0a0;
        }
        
        .digital-temp {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .digital-temp .temp-value {
            font-size: 4rem;
            font-weight: bold;
            color: #2ed573;
            font-family: 'Courier New', monospace;
        }
        
        .digital-temp .temp-unit {
            font-size: 1.5rem;
            color: #a0a0a0;
        }
        
        .temp-range {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        
        .range-min {
            color: #3498db;
            font-weight: 500;
        }
        
        .range-target {
            color: #2ed573;
            font-weight: 600;
        }
        
        .range-max {
            color: #e74c3c;
            font-weight: 500;
        }
        
        .control-panel {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        
        .btn-primary {
            background: linear-gradient(90deg, #00d4ff, #7b2fff);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        
        .status-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .status-label {
            color: #a0a0a0;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        
        .status-value {
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .status-on {
            color: #2ed573;
        }
        
        .status-off {
            color: #ff4757;
        }
        
        .status-idle {
            color: #ffa502;
        }
        
        .chart-container {
            height: 300px;
            position: relative;
        }
        
        .chart {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: flex-end;
            gap: 2px;
            padding: 10px;
        }
        
        .chart-bar {
            flex: 1;
            background: linear-gradient(to top, #00d4ff, #7b2fff);
            border-radius: 4px 4px 0 0;
            transition: height 0.3s ease;
            min-height: 5px;
        }
        
        .chart-bar.target {
            background: linear-gradient(to top, #2ed573, #7bed9f);
        }
        
        .chart-labels {
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
            font-size: 0.75rem;
            color: #a0a0a0;
            margin-top: 5px;
        }
        
        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        
        .history-table th,
        .history-table td {
            padding: 8px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .history-table th {
            color: #a0a0a0;
            font-weight: 600;
            font-size: 0.85rem;
        }
        
        .history-table td {
            font-size: 0.9rem;
        }
        
        .action-heat { color: #ff4757; }
        .action-cool { color: #00d4ff; }
        .action-idle { color: #ffa502; }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #7b2fff);
            transition: width 0.3s ease;
            border-radius: 3px;
        }
        
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #00d4ff;
        }
        
        .stat-label {
            font-size: 0.85rem;
            color: #a0a0a0;
            margin-top: 5px;
        }
        
        .algo-description {
            background: rgba(0, 212, 255, 0.1);
            border-left: 4px solid #00d4ff;
            padding: 15px;
            margin-top: 20px;
            border-radius: 0 8px 8px 0;
        }
        
        .algo-description h4 {
            color: #00d4ff;
            margin-bottom: 8px;
        }
        
        .algo-description p {
            color: #a0a0a0;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 工业智能控制仿真平台</h1>
            <p class="subtitle">探索先进强化学习算法在温控系统中的应用</p>
        </header>
        
        <div class="nav-bar">
            <a href="/" class="nav-btn active">RL 温控 Demo</a>
            <a href="/pinns" class="nav-btn">PINNs Demo</a>
            <a href="/building-hvac" class="nav-btn">🏢 Building HVAC</a>
        </div>
        
        <div class="algorithm-selector">
            <button class="algo-btn active" data-algo="rule_based">📋 规则控制</button>
            <button class="algo-btn" data-algo="safe_rl">🛡️ 安全 RL</button>
            <button class="algo-btn" data-algo="constrained_rl">📏 约束 RL</button>
            <button class="algo-btn" data-algo="mbpo">🧠 MBPO</button>
            <button class="algo-btn" data-algo="hierarchical_rl">🏰 层级 RL</button>
            <button class="algo-btn" data-algo="rl_mpc">⚡ RL+MPC</button>
        </div>
        
        <div class="main-content">
            <div class="card">
                <h2 class="card-title">🌡️ 实时温度监控</h2>
                
                <div class="temp-display">
                    <div class="digital-temp">
                        <span class="temp-value" id="current-temp">25.00</span>
                        <span class="temp-unit">°C</span>
                    </div>
                    <div class="temp-range">
                        <span class="range-min">20°C</span>
                        <span class="range-target">目标: 25°C</span>
                        <span class="range-max">35°C</span>
                    </div>
                </div>
                
                <div class="status-grid">
                    <div class="status-item">
                        <div class="status-label">加热器</div>
                        <div class="status-value" id="heater-status">OFF</div>
                    </div>
                    <div class="status-item">
                        <div class="status-label">冷却器</div>
                        <div class="status-value" id="cooler-status">OFF</div>
                    </div>
                    <div class="status-item">
                        <div class="status-label">当前动作</div>
                        <div class="status-value" id="action-status">IDLE</div>
                    </div>
                    <div class="status-item">
                        <div class="status-label">步数</div>
                        <div class="status-value" id="step-count">0</div>
                    </div>
                </div>
                
                <div class="control-panel">
                    <button class="btn btn-primary" onclick="startSimulation()">▶️ 开始仿真</button>
                    <button class="btn btn-secondary" onclick="stepSimulation()">⏭️ 单步执行</button>
                    <button class="btn btn-secondary" onclick="resetSimulation()">🔄 重置</button>
                </div>
                
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
                </div>
                
                <div class="algo-description" id="algo-desc">
                    <h4>📋 规则控制</h4>
                    <p>基于阈值的简单控制策略：温度低于 24°C 时加热，高于 26°C 时冷却，否则保持不变。适用于简单场景，无需训练。</p>
                </div>
            </div>
            
            <div class="card">
                <h2 class="card-title">📈 温度变化曲线</h2>
                
                <div class="chart-container">
                    <div class="chart" id="chart">
                    </div>
                </div>
                <div class="chart-labels">
                    <span>Step 1</span>
                    <span>Step 50</span>
                </div>
                
                <div class="stats-panel">
                    <div class="stat-card">
                        <div class="stat-value" id="avg-temp">--</div>
                        <div class="stat-label">平均温度</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="max-temp">--</div>
                        <div class="stat-label">最高温度</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="min-temp">--</div>
                        <div class="stat-label">最低温度</div>
                    </div>
                </div>
            </div>
            
            <div class="card" style="grid-column: span 2;">
                <h2 class="card-title">📊 历史记录</h2>
                <div style="max-height: 300px; overflow-y: auto;">
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th>步数</th>
                                <th>温度(°C)</th>
                                <th>目标(°C)</th>
                                <th>加热器</th>
                                <th>冷却器</th>
                                <th>动作</th>
                            </tr>
                        </thead>
                        <tbody id="history-body">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const TEMP_MIN = 20;
        const TEMP_MAX = 35;
        const TARGET_TEMP = 25;
        
        let isRunning = false;
        let intervalId = null;
        let history = [];
        let currentAlgorithm = 'rule_based';
        
        const algoDescriptions = {
            rule_based: {
                title: '📋 规则控制',
                desc: '基于阈值的简单控制策略：温度低于 24°C 时加热，高于 26°C 时冷却，否则保持不变。适用于简单场景，无需训练。'
            },
            safe_rl: {
                title: '🛡️ 安全强化学习',
                desc: '在标准 RL 基础上增加安全层，当温度接近边界时自动阻止危险动作（如接近上限时禁止加热）。通过双层架构保障系统安全。'
            },
            constrained_rl: {
                title: '📏 约束强化学习',
                desc: '使用拉格朗日乘子法处理约束优化问题，在最大化奖励的同时确保约束满足（如温度不越界）。典型算法：CPO（约束策略优化）。'
            },
            mbpo: {
                title: '🧠 基于模型的策略优化',
                desc: '先学习环境动力学模型，再基于模型进行规划和策略优化。数据效率高，适合样本获取成本高的场景。'
            },
            hierarchical_rl: {
                title: '🏰 层级强化学习',
                desc: '将复杂任务分解为高层选项（Options）和低层动作。高层策略选择选项，低层策略执行具体动作，支持长期规划。'
            },
            rl_mpc: {
                title: '⚡ RL+MPC 混合控制',
                desc: '结合强化学习的学习能力和模型预测控制（MPC）的优化能力。RL 学习策略作为初始策略，MPC 进行在线优化。'
            }
        };
        
        function updateAlgoDescription(algo) {
            const desc = algoDescriptions[algo];
            const el = document.getElementById('algo-desc');
            el.innerHTML = `<h4>${desc.title}</h4><p>${desc.desc}</p>`;
        }
        
        function selectAlgorithm(algo) {
            currentAlgorithm = algo;
            
            document.querySelectorAll('.algo-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-algo="${algo}"]`).classList.add('active');
            
            updateAlgoDescription(algo);
            resetSimulation();
        }
        
        function updateStatus(data) {
            document.getElementById('current-temp').textContent = data.temp.toFixed(2);
            document.getElementById('step-count').textContent = data.step;
            document.getElementById('heater-status').textContent = data.heater ? 'ON' : 'OFF';
            document.getElementById('heater-status').className = 'status-value ' + (data.heater ? 'status-on' : 'status-off');
            document.getElementById('cooler-status').textContent = data.cooler ? 'ON' : 'OFF';
            document.getElementById('cooler-status').className = 'status-value ' + (data.cooler ? 'status-on' : 'status-off');
            document.getElementById('action-status').textContent = data.action.toUpperCase();
            document.getElementById('action-status').className = 'status-value action-' + data.action;
        }
        
        function updateChart() {
            const chart = document.getElementById('chart');
            chart.innerHTML = '';
            
            history.forEach((item, index) => {
                const bar = document.createElement('div');
                bar.className = 'chart-bar';
                const height = ((item.temp - TEMP_MIN) / (TEMP_MAX - TEMP_MIN)) * 100;
                bar.style.height = `${Math.max(height, 2)}%`;
                bar.title = `Step ${item.step}: ${item.temp}°C`;
                chart.appendChild(bar);
            });
            
            const targetBar = document.createElement('div');
            targetBar.className = 'chart-bar target';
            const targetHeight = ((TARGET_TEMP - TEMP_MIN) / (TEMP_MAX - TEMP_MIN)) * 100;
            targetBar.style.height = `${targetHeight}%`;
            targetBar.title = `Target: ${TARGET_TEMP}°C`;
            chart.appendChild(targetBar);
        }
        
        function updateHistory() {
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = '';
            
            history.slice(-20).reverse().forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.step}</td>
                    <td>${item.temp}</td>
                    <td>${item.target}</td>
                    <td>${item.heater ? 'ON' : 'OFF'}</td>
                    <td>${item.cooler ? 'ON' : 'OFF'}</td>
                    <td class="action-${item.action}">${item.action.toUpperCase()}</td>
                `;
                tbody.appendChild(row);
            });
        }
        
        function updateStats() {
            if (history.length === 0) return;
            
            const temps = history.map(h => h.temp);
            document.getElementById('avg-temp').textContent = (temps.reduce((a, b) => a + b, 0) / temps.length).toFixed(2);
            document.getElementById('max-temp').textContent = Math.max(...temps).toFixed(2);
            document.getElementById('min-temp').textContent = Math.min(...temps).toFixed(2);
        }
        
        async function stepSimulation() {
            const response = await fetch('/api/step', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ algorithm: currentAlgorithm })
            });
            const data = await response.json();
            history.push(data);
            updateStatus(data);
            updateChart();
            updateHistory();
            updateStats();
            
            const progress = (history.length / 50) * 100;
            document.getElementById('progress-fill').style.width = `${Math.min(progress, 100)}%`;
        }
        
        async function resetSimulation() {
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = null;
            }
            isRunning = false;
            
            const response = await fetch('/api/reset', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ algorithm: currentAlgorithm })
            });
            const data = await response.json();
            
            history = [];
            updateStatus({ temp: data.initial_temp, step: 0, heater: false, cooler: false, action: 'idle' });
            updateChart();
            updateHistory();
            updateStats();
            document.getElementById('progress-fill').style.width = '0%';
        }
        
        async function startSimulation() {
            if (isRunning) return;
            isRunning = true;
            
            while (isRunning && history.length < 50) {
                await stepSimulation();
                await new Promise(resolve => setTimeout(resolve, 300));
            }
            
            isRunning = false;
        }
        
        document.addEventListener('DOMContentLoaded', async () => {
            document.querySelectorAll('.algo-btn').forEach(btn => {
                btn.addEventListener('click', () => selectAlgorithm(btn.dataset.algo));
            });
            
            await resetSimulation();
        });
    </script>
</body>
</html>
